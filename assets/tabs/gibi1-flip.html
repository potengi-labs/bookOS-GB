
<link href="assets/css/gibi-flip.css" rel="stylesheet">

<body>
<div class="book">
    <div id="flipbook">
        <div class="page">            <img src="../img/gibi1/capa.jpg">        </div>
        <div class="page">            <img src="../img/gibi1/01.jpg">        </div>
        <div class="page">            <img src="../img/gibi1/02.jpg">        </div>
        <div class="page">            <img src="../img/gibi1/03.jpg">        </div>
        <div class="page">            <img src="../img/gibi1/04.jpg">        </div>
        <div class="page">            <img src="../img/gibi1/05.jpg">        </div>
        <div class="page">            <img src="../img/gibi1/06.jpg">        </div>
        <div class="page">            <img src="../img/gibi1/07.jpg">        </div>
        <div class="page">            <img src="../img/gibi1/08.jpg">        </div>
        <div class="page">            <img src="../img/gibi1/09.jpg">        </div>
        <div class="page">            <img src="../img/gibi1/10.jpg">        </div>
        <div class="page">            <img src="../img/gibi1/11.jpg">        </div>
    </div>
</div>

<div class="controls">    <button id="prev">◀</button>    <button id="next">▶</button></div>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>
const flipBook = new St.PageFlip(
    document.getElementById("flipbook"),
    {
        width:300,
        height:500,

        size:"stretch",

        minWidth:315,
        maxWidth:1000,

        minHeight:420,
        maxHeight:1350,

        showCover:true,
        autoSize:true,

        usePortrait:true,
        mobileScrollSupport:false,

        maxShadowOpacity:0.6,

        flippingTime:800,

        drawShadow:true
    }
);

flipBook.loadFromHTML(
    document.querySelectorAll(".page")
);

document
.getElementById("next")
.onclick = ()=>flipBook.flipNext();

document
.getElementById("prev")
.onclick = ()=>flipBook.flipPrev();

</script>

</body>
